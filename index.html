<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(to right, #a0799e, #c03f84);">

<div class="container py-5">
    
    <div class="card p-4 shadow-lg mx-auto" style="max-width: 700px;">
        <h2 class="text-center mb-4">Resume Builder</h2>

        <!-- Basic Info -->
        <input type="text" id="name" class="form-control mb-2" placeholder="Full Name">
        <input type="text" id="linkedin" class="form-control mb-2" placeholder="LinkedIn URL">
        <input type="text" id="phone" class="form-control mb-3" placeholder="Phone Number">

        <!-- Education -->
        <textarea id="education" class="form-control mb-3" placeholder="Education"></textarea>

        <!-- Skills -->
        <h5>Skills</h5>
        <div id="skillsSection">
            <input type="text" class="form-control mb-2 skill" placeholder="Enter Skill">
        </div>
        <button onclick="addSkill()" class="btn btn-secondary mb-3">+ Add Skill</button>

        <!-- Projects -->
        <h5>Projects</h5>
        <div id="projectSection">
            <input type="text" class="form-control mb-2 project" placeholder="Enter Project">
        </div>
        <button onclick="addProject()" class="btn btn-secondary mb-3">+ Add Project</button>

        <!-- Achievements -->
        <textarea id="achievements" class="form-control mb-3" placeholder="Achievements"></textarea>

        <!-- Generate -->
        <button onclick="generateResume()" class="btn btn-dark w-100">Generate Resume</button>
    </div>

    <!-- Output -->
    <div id="output" class="mt-5 p-4 bg-white shadow mx-auto" style="max-width: 700px;"></div>

</div>

<script>
function addSkill() {
    let input = document.createElement("input");
    input.type = "text";
    input.placeholder = "Enter Skill";
    input.className = "form-control mb-2 skill";

    document.getElementById("skillsSection").appendChild(input);
}

function addProject() {
    let input = document.createElement("input");
    input.type = "text";
    input.placeholder = "Enter Project";
    input.className = "form-control mb-2 project";

    document.getElementById("projectSection").appendChild(input);
}

function generateResume() {
    let name = document.getElementById("name").value;
    let linkedin = document.getElementById("linkedin").value;
    let phone = document.getElementById("phone").value;
    let education = document.getElementById("education").value;
    let achievements = document.getElementById("achievements").value;

    let skills = document.querySelectorAll(".skill");
    let skillList = "";
    skills.forEach(skill => {
        if(skill.value.trim() !== "") {
            skillList += `<li>${skill.value}</li>`;
        }
    });

    let projects = document.querySelectorAll(".project");
    let projectList = "";
    projects.forEach(project => {
        if(project.value.trim() !== "") {
            projectList += `<li>${project.value}</li>`;
        }
    });

    let resume = `
    <div style="border: 2px solid #000; padding: 25px; max-width: 700px; margin:auto; font-family: Arial;">

        <h1 style="text-align:center; font-weight:bold;">${name}</h1>

        <p style="text-align:center;">
            📞 ${phone} | 
            🔗 <a href="${linkedin}" target="_blank">${linkedin}</a>
        </p>

        <hr>

        <h4><b>Education</b></h4>
        <p>${education}</p>

        <h4><b>Skills</b></h4>
        <ul>${skillList}</ul>

        <h4><b>Projects</b></h4>
        <ul>${projectList}</ul>

        <h4><b>Achievements</b></h4>
        <p>${achievements}</p>

    </div>
    `;

    document.getElementById("output").innerHTML = resume;
}
    
</script>

</body>
</html>
