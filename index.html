<div class="section-panel active" id="panel-basics">

  <form onsubmit="return validateForm()">

    <div class="panel-head">
      <div class="panel-title">Contact Info</div>
      <div class="panel-desc">Your name and details appear at the very top of your resume.</div>
    </div>

    <div class="row2">
      <div class="field">
        <label>First Name</label>
        <input id="firstName" placeholder="Aanya" required oninput="live()">
      </div>

      <div class="field">
        <label>Last Name</label>
        <input id="lastName" placeholder="Sharma" required oninput="live()">
      </div>
    </div>

    <div class="field">
      <label>Job Title / Role</label>
      <input id="jobTitle" placeholder="Full-Stack Developer" required oninput="live()">
    </div>

    <div class="row2">
      <div class="field">
        <label>Email</label>
        <input id="email" type="email" placeholder="aanya@example.com" required oninput="live()">
      </div>

      <div class="field">
        <label>Phone</label>
        <input id="phone" placeholder="9876543210" required oninput="live()">
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>Location</label>
        <input id="location" placeholder="Bengaluru, India" oninput="live()">
      </div>

      <div class="field">
        <label>LinkedIn</label>
        <input id="linkedin" placeholder="linkedin.com/in/aanya" oninput="live()">
      </div>
    </div>

    <div class="row2">
      <div class="field">
        <label>GitHub</label>
        <input id="github" placeholder="github.com/aanya" oninput="live()">
      </div>

      <div class="field">
        <label>Portfolio / Website</label>
        <input id="website" placeholder="aanya.dev" oninput="live()">
      </div>
    </div>

    <!-- Submit Button -->
    <button class="btn btn-teal" type="submit" style="margin-top:15px;">
      Save & Validate
    </button>

  </form>

</div>
